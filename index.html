<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Heróis</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

</head>
<body>
   <img src="MHero.png" alt="Super Herói" class="hero-img">
   <h1>Cadastro de Heróis</h1>
   <input type="text" id="nomeHeroi" placeholder="Nome do herói">
   <input type="text" id="poderHeroi" placeholder="Poder">
   <input type="text" id="racaHeroi" placeholder="Raça">
   <input type="text" id="tipoHeroi" placeholder="Tipo">

<button id="botaoAdicionar">Adicionar</button>




  <h2>Lista de Heróis</h2>
  <ul id="Heroes"></ul>
<button id="botaoListar">Listar Heróis</button>

  
</body>
</html>
